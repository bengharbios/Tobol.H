<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طبول الحرب 3</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-background"></div>
    <div class="game-container">
        
        <!-- Header: Teams and Logo -->
        <header class="game-header">
            <!-- Red Team (Right) -->
            <div class="team red-team active-turn" id="redTeamBox" onclick="setForceTurn('red')">
                <input type="text" class="team-name" id="redTeamName" value="الجيش الأحمر">
                <input type="number" class="team-score" id="redTeamScore" value="350">
            </div>
            
            <!-- Logo Area -->
            <div class="logo-area">
                <h1 class="logo-text">طبول الحرب <span class="version">3</span></h1>
                <p class="subtitle">flashi.com</p>
            </div>
            
            <!-- Blue Team (Left) -->
            <div class="team blue-team" id="blueTeamBox" onclick="setForceTurn('blue')">
                <input type="text" class="team-name" id="blueTeamName" value="الجيش الأزرق">
                <input type="number" class="team-score" id="blueTeamScore" value="350">
            </div>
        </header>

        <!-- Main Board -->
        <main class="game-board">
            
            <!-- Right Panel (Animals) -->
            <div class="side-panel right-panel" id="rightPanel">
                <!-- Generated by JS -->
            </div>
            
            <!-- Center Panel (Main Image & Progress) -->
            <div class="center-panel">
                <div class="main-screen-container">
                    <div class="main-screen" id="mainScreen" onclick="changeMainImage()">
                        <div class="soldiers-silhouette">⚔️</div>
                        <h2 class="main-title">طبول<br>الحرب 3</h2>
                        <button class="nuclear-btn" id="nuclearBtn">☢️</button>
                    </div>
                </div>
                
                <div class="progress-bars">
                    <div class="progress-container red-progress">
                        <div class="progress-fill" id="redProgressFill" style="width: 100%;"></div>
                    </div>
                    <div class="progress-container blue-progress">
                        <div class="progress-fill" id="blueProgressFill" style="width: 100%;"></div>
                    </div>
                </div>
            </div>
            
            <!-- Left Panel (Symbols) -->
            <div class="side-panel left-panel" id="leftPanel">
                <!-- Generated by JS -->
            </div>
            
        </main>
        
        <!-- Bottom Panel (Numbers) -->
        <div class="bottom-panel" id="bottomPanel">
            <!-- Generated by JS -->
        </div>

    </div>

    <!-- Modal for showing weapon card -->
    <div id="cardModal" class="modal">
        <div class="modal-content" id="cardModalContent">
            <div class="card-header" id="cardHeader">
                <h2 id="weaponName">اسم السلاح</h2>
                <div class="card-diamonds" id="cardDiamonds">💎💎</div>
            </div>
            <div class="card-body">
                <div class="weapon-points-box">
                    <span class="weapon-points" id="weaponPoints">10</span>
                </div>
                <div class="weapon-desc" id="weaponDesc">وصف السلاح</div>
                <div class="weapon-action" id="weaponAction">تم خصم نقاط</div>
            </div>
            <button id="closeModalBtn" class="close-btn" onclick="closeCard()">متابعة</button>
        </div>
    </div>
    
    <!-- Win Modal -->
    <div id="winModal" class="modal">
        <div class="modal-content win-content" id="winContent">
            <h1>انتصار!</h1>
            <h2 id="winnerName">الجيش الأزرق</h2>
            <p>لقد دمر خصمه بالكامل.</p>
            <button class="close-btn" onclick="location.reload()">لعب مرة أخرى</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
